<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards — {{SITE_NAME}}</title>
  <link rel="stylesheet" href="{{THEME_CSS}}">
  <style>
    .flashcard-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: var(--padding-page);
      min-height: 60vh;
    }

    .flashcard-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: var(--text-mute);
      font-size: 1rem;
    }

    .flashcard-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: var(--spacing);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header role="banner">
    <h1>Flashcards</h1>
  </header>

  <main class="flashcard-wrapper" role="main">
    <div
      id="flashcard-app"
      data-src="{{FLASHCARD_DATA_PATH}}"
      aria-label="Flashcard application"
      role="application"
    >
      <div class="flashcard-loading" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <p>Loading flashcards&hellip;</p>
      </div>
    </div>
  </main>

  <script src="{{NAV_JS}}" defer></script>
  <script src="{{FLASHCARDS_JS}}" defer></script>
</body>
</html>
