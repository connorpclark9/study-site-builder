<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{EXAM_TITLE}} — {{SITE_NAME}}</title>
  <link rel="stylesheet" href="{{THEME_CSS}}">
  <link rel="stylesheet" href="{{EXAM_FORMAT_CSS}}">
  <style>
    .exam-page {
      max-width: 900px;
      margin: 0 auto;
      padding: var(--padding-page);
    }

    .exam-header {
      margin-bottom: var(--spacing-lg);
      padding-bottom: var(--spacing);
      border-bottom: 2px solid var(--accent);
    }

    .exam-header h1 {
      color: var(--white);
      margin-bottom: var(--spacing);
    }

    .exam-header p {
      color: var(--text-mute);
      line-height: 1.5;
    }

    .exam-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: var(--text-mute);
    }

    .exam-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: var(--spacing);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .exam-actions {
      margin-top: var(--spacing-lg);
      padding-top: var(--spacing-lg);
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .btn-show-answers {
      display: inline-block;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-show-answers:hover,
    .btn-show-answers:focus-visible {
      background: var(--accent-hi);
    }
  </style>
</head>
<body>
  <div class="exam-page">
    <header class="exam-header" role="banner">
      <h1>{{EXAM_TITLE}}</h1>
      <p>{{EXAM_DESCRIPTION}}</p>
    </header>

    <main role="main">
      <div
        id="exam-container"
        data-exam="{{EXAM_DATA_PATH}}"
        aria-label="Practice exam"
        role="application"
      >
        <div class="exam-loading" aria-live="polite">
          <div class="spinner" aria-hidden="true"></div>
          <p>Loading exam&hellip;</p>
        </div>
      </div>

      <div class="exam-actions">
        <button
          type="button"
          class="btn-show-answers"
          id="show-answers-btn"
          aria-label="Reveal all correct answers"
        >
          Show Correct Answers
        </button>
      </div>
    </main>
  </div>

  <script src="{{NAV_JS}}" defer></script>
  <script src="{{EXAM_FORMAT_JS}}" defer></script>
</body>
</html>
