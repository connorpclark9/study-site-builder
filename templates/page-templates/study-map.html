<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Map — {{SITE_NAME}}</title>
  <link rel="stylesheet" href="{{THEME_CSS}}">
  <style>
    .study-map-page {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--padding-page);
    }

    .study-map-page header {
      margin-bottom: var(--spacing-lg);
    }

    .study-map-page h1 {
      color: var(--white);
      margin-bottom: var(--spacing);
    }

    .study-map-page > .subtitle {
      color: var(--text-mute);
      font-size: 1rem;
    }

    /* Topic blocks */
    .topic-block {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: var(--spacing);
      background: var(--bg-card);
      overflow: hidden;
    }

    .topic-header {
      display: flex;
      align-items: center;
      gap: var(--spacing);
      padding: var(--padding-card);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .topic-header:hover {
      background: var(--bg-sub);
    }

    .topic-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .topic-info {
      flex: 1;
      min-width: 0;
    }

    .topic-eyebrow {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.15rem;
    }

    .topic-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.25rem;
    }

    .topic-desc {
      font-size: 0.88rem;
      color: var(--text-mute);
      line-height: 1.4;
    }

    .topic-right {
      display: flex;
      align-items: center;
      gap: var(--spacing);
      flex-shrink: 0;
    }

    .topic-pill {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      background: var(--bg-sub);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-mute);
      white-space: nowrap;
    }

    .chevron {
      width: 20px;
      height: 20px;
      border: none;
      background: none;
      color: var(--text-dim);
      transition: transform 0.25s;
      font-size: 0.85rem;
    }

    .chevron::after {
      content: "\25B6";
    }

    .topic-block.open .chevron {
      transform: rotate(90deg);
    }

    .topic-body {
      display: none;
      padding: 0 var(--padding-card) var(--padding-card);
    }

    .topic-block.open .topic-body {
      display: block;
    }

    /* Subtopic grid */
    .subtopic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--spacing);
    }

    .section-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: var(--spacing);
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }

    /* Subtopic cards */
    .subtopic {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-sub);
      overflow: hidden;
    }

    .subtopic-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 0.85rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .subtopic-hdr:hover {
      background: var(--bg-deep);
    }

    .subtopic-hdr .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      margin-right: 0.5rem;
    }

    .subtopic-hdr span {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--white);
    }

    .sub-chev {
      font-size: 0.7rem;
      color: var(--text-dim);
      transition: transform 0.2s;
    }

    .sub-chev::after {
      content: "\25B6";
    }

    .subtopic.open .sub-chev {
      transform: rotate(90deg);
    }

    .subtopic-body {
      display: none;
      padding: 0.65rem 0.85rem;
      border-top: 1px solid var(--border);
    }

    .subtopic.open .subtopic-body {
      display: block;
    }

    .subtopic-body .prose {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.55;
      margin-bottom: 0.5rem;
    }

    .subtopic-body .bullets {
      list-style: disc;
      padding-left: 1.25rem;
      margin: 0;
    }

    .subtopic-body .bullets li {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 0.25rem;
    }

    /* Link tags (connections) */
    .link-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.5rem;
    }

    .link-tag {
      font-size: 0.72rem;
      padding: 0.1rem 0.45rem;
      background: var(--bg-deep);
      color: var(--accent);
      border-radius: var(--radius-sm);
      text-decoration: none;
    }

    .link-tag:hover {
      background: var(--bg-card);
      color: var(--accent-hi);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .subtopic-grid {
        grid-template-columns: 1fr;
      }

      .topic-header {
        flex-wrap: wrap;
      }

      .topic-right {
        width: 100%;
        justify-content: flex-end;
        margin-top: 0.35rem;
      }
    }
  </style>
</head>
<body>
  <div class="study-map-page">
    <header role="banner">
      <h1>Study Map</h1>
      <p class="subtitle">Explore the course concepts organized by topic and lecture</p>
    </header>

    <main role="main">
      <div id="topics-container">
        {{STUDY_MAP_CONTENT}}
      </div>
    </main>
  </div>

  <script src="{{NAV_JS}}" defer></script>
  <script>
    function toggleTopic(id) { document.getElementById(id)?.classList.toggle('open'); }
    function toggleSub(id) { document.getElementById(id)?.classList.toggle('open'); }
  </script>
</body>
</html>
